{{- /* Project-level head extensions. PaperMod includes this partial in <head> if present. */ -}}
<style>
  /* Full-bleed hero image with dark gradient overlay and centered title/subtitle.
     Uses left:50% + negative margins to break out of PaperMod's centered .main container. */
  body { overflow-x: hidden; }
  .hero-image {
    position: relative;
    left: 50%;
    right: 50%;
    width: 100vw;
    height: 30vh;
    min-height: 180px;
    max-height: 360px;
    margin: 0 -50vw 2rem;
    padding: 0;
    overflow: hidden;
  }
  .hero-image img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0.7) 100%);
    pointer-events: none;
  }
  .hero-caption {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 1.5rem;
    color: #fff;
  }
  .hero-caption h1 {
    font-size: clamp(2rem, 5vw, 3.75rem);
    font-weight: 700;
    margin: 0 0 0.75rem;
    color: #fff;
    line-height: 1.1;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.65);
  }
  .hero-caption p {
    font-size: clamp(1.05rem, 2vw, 1.5rem);
    margin: 0;
    max-width: 720px;
    line-height: 1.45;
    color: rgba(255, 255, 255, 0.95);
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.65);
  }

  /* Petition CTA — adapts to light/dark mode via PaperMod's CSS variables. */
  .cta-petition {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.25rem;
    margin: 2rem auto;
    max-width: 640px;
    text-align: center;
  }
  .cta-petition h3 {
    margin: 0 0 .5rem;
    color: var(--primary);
    font-size: 1.25rem;
    line-height: 1.3;
  }
  .cta-petition p {
    color: var(--secondary);
    margin: 0 0 1.25rem;
    line-height: 1.5;
  }
  .cta-petition .cta-btn {
    display: inline-block;
    background: #c0392b;
    color: #ffffff !important;
    padding: .75rem 1.5rem;
    border-radius: 6px;
    font-weight: 600;
    text-decoration: none;
    transition: background .15s ease, transform .05s ease;
  }
  .cta-petition .cta-btn:hover,
  .cta-petition .cta-btn:focus {
    background: #962d22;
    color: #ffffff !important;
    text-decoration: none;
  }
  .cta-petition .cta-btn:active {
    transform: translateY(1px);
  }
</style>
