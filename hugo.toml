baseURL = "https://spring-street-rwc.github.io/"
locale = "en-us"
title = "Spring Street Neighbors — Redwood City"
theme = "PaperMod"

enableRobotsTXT = true
enableGitInfo = true
buildDrafts = false
buildFuture = false
buildExpired = false

# Markdown rendering — allow raw HTML in posts for occasional embeds beyond the
# built-in youtube shortcode.
[markup.goldmark.renderer]
unsafe = true

[outputs]
home = ["HTML", "RSS"]

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 10

[[menu.main]]
identifier = "bay-road"
name = "Bay Road Project"
url = "/bay-road-project/"
weight = 20

[[menu.main]]
identifier = "how-to-help"
name = "How to Help"
url = "/how-to-help/"
weight = 30

[[menu.main]]
identifier = "blog"
name = "Blog"
url = "/post/"
weight = 40

[params]
env = "production"
title = "Spring Street Neighbors"
description = "Neighbors in North Fair Oaks organizing for safe streets and traffic calming on Spring Street."
keywords = ["traffic-safety", "north-fair-oaks", "redwood-city", "spring-street", "bay-road", "complete-streets"]
author = "Spring Street Neighbors"
DateFormat = "January 2, 2006"
mainSections = ["post"]

# Light/dark theme: "auto" follows the visitor's OS preference and shows a
# sun/moon toggle in the header so they can override.
defaultTheme = "auto"
disableThemeToggle = false

ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = false
ShowToc = false
ShowRssButtonInSectionTermList = true
disableSpecial1stPost = true

# Petition / signup CTA. Replace petition_url with the real Google Form or
# Change.org URL when ready — the petition-cta shortcode reads from here so
# every CTA on the site updates with a single edit.
petition_url = "https://example.org/sign"
petition_label = "Sign the petition"

[params.assets]
disableHLJS = true
disableFingerprinting = false
favicon = "/favicon.ico"
